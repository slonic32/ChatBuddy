<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat App</title>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h2>Conversations</h2>
        <ul>
          <li><a href="#">Chat about JavaScript</a></li>
          <li><a href="#">Help with CSS</a></li>
        </ul>
        <button>New Chat</button>
      </aside>
      <header>
        <h1>Chat about JavaScript</h1>
      </header>
      <main class="chat">
        <section class="messages">
          <div class="message user"><p>What is a closure?</p></div>
          <div class="message assistant">
            <p>A closure is a function that...</p>
          </div>
        </section>
        <form class="input-area">
          <input type="text" placeholder="Type a message..." required />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>
    <script src="messageAPI.js" type="module"></script>
  </body>
</html>
